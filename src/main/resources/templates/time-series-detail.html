<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Time series detail</title>
    <link rel="stylesheet" href="/navbar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container my-4">

    <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
        <div>
            <h1 class="mb-1">Detail časové řady</h1>
            <div class="text-muted">
                ID: <span id="timeSeriesIdText" th:text="${timeSeriesId}">-</span>
            </div>
        </div>

        <a class="btn btn-outline-secondary" href="/time-series">
            Zpět na seznam
        </a>
    </div>

    <div id="errorBox" class="alert alert-danger d-none"></div>

    <div class="row g-3">

        <div class="col-12 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Statistiky</h5>

                    <div class="mb-2">
                        <strong>Název:</strong>
                        <span id="tsName">-</span>
                    </div>

                    <div class="mb-2">
                        <strong>Pozorování:</strong>
                        <span id="tsObservations">-</span>
                    </div>

                    <div class="mb-2">
                        <strong>Průměr (mean):</strong>
                        <span id="tsMean">-</span>
                    </div>

                    <div class="mb-2">
                        <strong>Šikmost (skewness):</strong>
                        <span id="tsSkewness">-</span>
                    </div>

                    <div class="mb-2">
                        <strong>Špičatost (kurtosis):</strong>
                        <span id="tsKurtosis">-</span>
                    </div>

                    <div class="mb-2">
                        <strong>Minimum:</strong>
                        <span id="tsMin">-</span>
                    </div>

                    <div class="mb-2">
                        <strong>Maximum:</strong>
                        <span id="tsMax">-</span>
                    </div>

                    <hr />

                    <button id="reloadBtn" class="btn btn-outline-primary btn-sm">
                        Načíst znovu
                    </button>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Graf</h5>

                    <div style="height: 380px;">
                        <canvas id="timeSeriesChart"></canvas>
                    </div>

                    <div class="text-muted mt-2 small">
                        Graf: Chart.js (parsing:false, animation:false)
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<div id="pageData" th:attr="data-time-series-id=${timeSeriesId}" style="display:none;"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/time-series-chart.js"></script>

<script src="/js/time-series-detail-page.js"></script>

</body>
</html>
