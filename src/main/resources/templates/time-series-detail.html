<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Time series detail</title>
    <link rel="stylesheet" href="/navbar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container my-4"
     id="pageData"
     th:attr="data-time-series-id=${timeSeriesId}">

    <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
        <div>
            <h1 class="mb-1">Detail časové řady</h1>
            <div class="text-muted">
                ID: <span id="timeSeriesIdText" th:text="${timeSeriesId}">-</span>
            </div>
        </div>

        <a class="btn btn-outline-secondary" href="/time-series">
            Zpět na seznam
        </a>
    </div>

    <div class="row g-3">

        <div class="col-12 col-lg-12">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="d-flex align-items-center justify-content-between gap-2 mb-3">
                        <h5 class="card-title mb-0">Statistiky</h5>
                        <button id="reloadBtn" class="btn btn-outline-primary btn-sm" type="button">
                            Načíst znovu
                        </button>
                    </div>

                    <div id="statsBox"></div>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-12">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">Graf</h5>

                    <div style="height: 380px;">
                        <canvas id="timeSeriesChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<div th:replace="~{fragments/error-modal :: errorModal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/app/chart.js"></script>
<script src="/js/app/errorModal.js"></script>
<script src="/js/app/http.js"></script>
<script src="/js/app/createElements.js"></script>
<script src="/js/app/format.js"></script>

<script src="/js/pages/time-series-detail.js"></script>

</body>
</html>
