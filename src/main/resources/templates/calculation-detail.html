<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Calculation detail</title>
  <link rel="stylesheet" href="/navbar.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container my-4"
     id="pageData"
     th:attr="data-calculation-id=${calculationId}">

  <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
    <div>
      <h1 class="mb-1">Detail výpočtu</h1>
      <div class="text-muted">
        ID: <span id="calculationIdText" th:text="${calculationId}">-</span>
      </div>
    </div>

    <a class="btn btn-outline-secondary" href="/calculation">
      Zpět na seznam
    </a>
  </div>

  <div id="errorBox" class="alert alert-danger d-none"></div>

  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <h5 class="card-title mb-3">Kalkulace</h5>

      <div class="row g-2">
        <div class="col-12 col-md-6">
          <strong>Forecast:</strong> <span id="calcForecast">-</span>
        </div>
        <div class="col-12 col-md-6">
          <strong>Status:</strong> <span id="calcStatus">-</span>
        </div>
        <div class="col-12 col-md-6">
          <strong>Spustil:</strong> <span id="calcUser">-</span>
        </div>
        <div class="col-12 col-md-6">
          <strong>Datum:</strong> <span id="calcRunAt">-</span>
        </div>
      </div>

      <button id="reloadBtn" class="btn btn-outline-primary btn-sm mt-3">
        Načíst znovu
      </button>
    </div>
  </div>

  <div class="row g-3">

    <!-- VSTUP -->
    <div class="col-12 col-xl-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between gap-2">
            <h5 class="card-title mb-0">Vstupní časová řada</h5>

            <div class="d-flex align-items-center gap-2">
              <a id="inputDownloadBtn"
                 class="btn btn-outline-success btn-sm d-none"
                 href="#"
                 role="button">
                Stáhnout
              </a>
              <span class="text-muted small" id="inputTsId">-</span>
            </div>
          </div>

          <hr class="my-3" />

          <div class="row g-2 small">
            <div class="col-6"><strong>Název:</strong> <span id="inName">-</span></div>
            <div class="col-6"><strong>Pozorování:</strong> <span id="inObs">-</span></div>

            <div class="col-6"><strong>Mean:</strong> <span id="inMean">-</span></div>
            <div class="col-6"><strong>Skewness:</strong> <span id="inSkew">-</span></div>

            <div class="col-6"><strong>Kurtosis:</strong> <span id="inKurt">-</span></div>
            <div class="col-6"><strong>Min:</strong> <span id="inMin">-</span></div>

            <div class="col-6"><strong>Max:</strong> <span id="inMax">-</span></div>
          </div>

          <div class="mt-3" style="height: 320px;">
            <canvas id="inputChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- VÝSTUP -->
    <div class="col-12 col-xl-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between gap-2">
            <h5 class="card-title mb-0">Výstupní časová řada</h5>

            <div class="d-flex align-items-center gap-2">
              <a id="outputDownloadBtn"
                 class="btn btn-outline-success btn-sm d-none"
                 href="#"
                 role="button">
                Stáhnout
              </a>
              <span class="text-muted small" id="resultTsId">-</span>
            </div>
          </div>

          <hr class="my-3" />

          <div class="row g-2 small">
            <div class="col-6"><strong>Název:</strong> <span id="outName">-</span></div>
            <div class="col-6"><strong>Pozorování:</strong> <span id="outObs">-</span></div>

            <div class="col-6"><strong>Mean:</strong> <span id="outMean">-</span></div>
            <div class="col-6"><strong>Skewness:</strong> <span id="outSkew">-</span></div>

            <div class="col-6"><strong>Kurtosis:</strong> <span id="outKurt">-</span></div>
            <div class="col-6"><strong>Min:</strong> <span id="outMin">-</span></div>

            <div class="col-6"><strong>Max:</strong> <span id="outMax">-</span></div>
          </div>

          <div class="mt-3" style="height: 320px;">
            <canvas id="resultChart"></canvas>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/calculation-detail-page.js"></script>

</body>
</html>
