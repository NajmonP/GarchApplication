<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Calculation detail</title>
  <link rel="stylesheet" href="/navbar.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<form id="csrfForm" style="display:none;">
  <input type="hidden" id="csrfToken" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
  <input type="hidden" id="csrfHeaderName" th:value="${_csrf.headerName}"/>
</form>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container my-4"
     id="pageData"
     th:attr="data-calculation-id=${calculationId}">

  <div class="d-flex align-items-center justify-content-between gap-3 mb-3">
    <div>
      <h1 class="mb-1">Detail výpočtu</h1>
      <div class="text-muted">
        ID: <span id="calculationIdText" th:text="${calculationId}">-</span>
      </div>
    </div>

    <a class="btn btn-outline-secondary" href="/calculation">
      Zpět na seznam
    </a>
  </div>

  <div id="errorBox" class="alert alert-danger d-none"></div>

  <div class="row g-3">

    <!-- KALKULACE -->
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between gap-2 mb-3">
            <h5 class="card-title mb-0">Kalkulace</h5>
            <button id="rerunBtn" class="btn btn-outline-success btn-sm d-none" type="button">
              Spustit kalkulaci znovu
            </button>
            <button id="reloadBtn" class="btn btn-outline-primary btn-sm" type="button">
              Načíst znovu
            </button>
          </div>

          <div id="calcStatsBox"></div>
        </div>
      </div>
    </div>

    <!-- VSTUP -->
    <div class="col-12 col-lg-12">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between gap-2">
            <h5 class="card-title mb-0">Vstupní časová řada</h5>

            <div class="d-flex align-items-center gap-2">
              <button id="inputDownloadBtn" class="btn btn-outline-success btn-sm js-download d-none" type="button">
                Stáhnout
              </button>
              <span class="text-muted small" id="inputTsId">-</span>
            </div>
          </div>

          <hr class="my-3"/>

          <div id="inputStatsBox"></div>

          <div class="mt-3" style="height: 320px;">
            <canvas id="inputChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- VÝSTUP -->
    <div class="col-12 col-lg-12">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex align-items-center justify-content-between gap-2">
            <h5 class="card-title mb-0">Výstupní časová řada</h5>

            <div class="d-flex align-items-center gap-2">
              <button id="outputDownloadBtn" class="btn btn-outline-success btn-sm js-download d-none" type="button">
                Stáhnout
              </button>
              <span class="text-muted small" id="resultTsId">-</span>
            </div>
          </div>

          <hr class="my-3"/>

          <div id="outputStatsBox"></div>

          <div class="mt-3" style="height: 320px;">
            <canvas id="resultChart"></canvas>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div th:replace="~{fragments/error-modal :: errorModal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/app/chart.js"></script>
<script src="/js/app/errorModal.js"></script>
<script src="/js/app/http.js"></script>
<script src="/js/app/createElements.js"></script>
<script src="/js/app/format.js"></script>
<script src="/js/app/initButtons.js"></script>

<script src="/js/pages/calculation-detail.js"></script>

</body>
</html>
