<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Výpočet</title>
    <link rel="stylesheet" href="/navbar.css">
    <link rel="stylesheet" href="/index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="mode-container container mt-3">
    <div class="mb-3"  th:if="${#authorization.expression('isAuthenticated()')}">
        <label class="form-label d-block">Způsob zadání</label>

        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" id="mode-manual" name="modeSelector" checked>
            <label class="form-check-label" for="mode-manual">Ruční zadání</label>
        </div>

        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" id="mode-config" name="modeSelector">
            <label class="form-check-label" for="mode-config">Konfigurace z DB</label>
        </div>
    </div>

    <div class="form-wrap">
        <form class="form-manual" th:action="@{/start-calculation-manual}" method="post" enctype="multipart/form-data">
            <label for="forecast" class="form-label">Předpověď</label>
            <input type="number" step="1" id="forecast" name="forecast" required class="form-control">

            <label for="start_variance" class="form-label mt-3">Počáteční rozptyl</label>
            <input type="number" step="0.0001" id="start_variance" name="start_variance" required class="form-control"/>

            <label for="constant_variance" class="form-label mt-3">Konstantní rozptyl</label>
            <input type="number" step="0.0001" id="constant_variance" name="constant_variance" required class="form-control"/>

            <div class="mt-3">
                <div class="d-flex justify-content-between align-items-center">
                    <label class="form-label m-0">Váhy minulých rozptylů (last variances)</label>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-sm btn-outline-primary" id="addLastVariance">Přidat rozptyl</button>
                        <button type="button" class="btn btn-sm btn-outline-danger" id="removeLastVariance">Odebrat</button>
                    </div>
                </div>

                <div id="lastVarianceList" class="row-gap mt-2">
                    <div class="row-item">
                        <input type="number" step="0.0001" name="last_variance[]" class="form-control" required>
                    </div>
                </div>
            </div>

            <div class="mt-3">
                <div class="d-flex justify-content-between align-items-center">
                    <label class="form-label m-0">Váhy minulých šoků (last shocks)</label>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-sm btn-outline-primary" id="addLastShock">Přidat šok</button>
                        <button type="button" class="btn btn-sm btn-outline-danger" id="removeLastShock">Odebrat</button>
                    </div>
                </div>

                <div id="lastShockList" class="row-gap mt-2">
                    <div class="row-item">
                        <input type="number" step="0.0001" name="last_shock[]" class="form-control" required>
                    </div>
                </div>
            </div>

            <label for="timeSeriesIdManual" class="form-label mt-3">Vyber časovou řadu</label>
            <select id="timeSeriesIdManual" name="timeSeriesId" class="form-select">
                <option value="" selected disabled>— vyber —</option>
            </select>

            <label for="time_series_file" class="form-label mt-3">Soubor s časovou řadou (XLSX)</label>
            <input type="file" id="time_series_file" name="time_series_file" accept=".xlsx,.xls" class="form-control"/>

            <button type="submit" class="btn btn-primary w-100 mt-3">Spustit výpočet</button>
        </form>

        <form class="form-config" th:action="@{/start-calculation-configuration}" method="post" enctype="multipart/form-data"  th:if="${#authorization.expression('isAuthenticated()')}">
            <input type="hidden" name="mode" value="config"/>

            <label for="forecast_config" class="form-label">Předpověď</label>
            <input type="number" step="1" id="forecast_config" name="forecast_config" required class="form-control">

            <label for="configurationId" class="form-label mt-3">Vyber konfiguraci</label>
            <select id="configurationId" name="configurationId" required class="form-select">
                <option value="" selected disabled>— vyber —</option>
            </select>

            <div id="modelList" class="mt-3"></div>

            <label for="timeSeriesId" class="form-label mt-3">Vyber časovou řadu</label>
            <select id="timeSeriesId" name="timeSeriesId" class="form-select">
                <option value="" selected disabled>— vyber —</option>
            </select>

            <label for="time_series_file_config" class="form-label mt-3">Soubor s časovou řadou (XLSX)</label>
            <input type="file" id="time_series_file_config" name="time_series_file" accept=".xlsx,.xls" class="form-control"/>

            <button  type="submit" class="btn btn-secondary w-100 mt-3">Spustit výpočet (konfigurace)</button>
        </form>

        <div class="mt-4 d-none" id="resultSection" style="height: 320px;">
            <h4>Výsledek</h4>
            <canvas id="resultChart"></canvas>
        </div>
    </div>
</div>

<div th:replace="~{fragments/error-modal :: errorModal}"></div>

<template id="tpl-last-variance">
    <div class="row-item">
        <input type="number" step="0.0001" name="last_variance[]" class="form-control" required>
    </div>
</template>

<template id="tpl-last-shock">
    <div class="row-item">
        <input type="number" step="0.0001" name="last_shock[]" class="form-control" required>
    </div>
</template>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/app/errorModal.js"></script>
<script src="/js/app/http.js"></script>
<script src="/js/app/chart.js"></script>
<script src="/js/app/createElements.js"></script>

<script src="/js/pages/index.js"></script>
</body>
</html>
