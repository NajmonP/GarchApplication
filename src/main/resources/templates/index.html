<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/navbar.css">
    <link rel="stylesheet" href="/index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>


<div class="mode-container container mt-3">
    <!-- Přepínač režimu -->
    <div class="mb-3">
        <label class="form-label d-block">Způsob zadání</label>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" id="mode-manual" name="modeSelector" checked>
            <label class="form-check-label" for="mode-manual">Ruční zadání</label>
        </div>
        <div class="form-check form-check-inline" th:if="${#authorization.expression('isAuthenticated()')}">
            <input class="form-check-input" type="radio" id="mode-config" name="modeSelector">
            <label class="form-check-label" for="mode-config">Konfigurace z DB</label>
        </div>
    </div>

    <div class="form-wrap">
        <form class="form-manual" th:action="@{/start-calculation-manual}" method="post" enctype="multipart/form-data">
            <label for="start_variance" class="form-label">Počáteční rozptyl:</label>
            <input type="number" step="0.0001" id="start_variance" name="start_variance" required/>

            <label for="constant_variance" class="form-label">Konstantní rozptyl:</label>
            <input type="number" step="0.0001" id="constant_variance" name="constant_variance" required/>

            <!-- Dynamické: Last variances -->
            <div class="mt-3">
                <div class="d-flex justify-content-between align-items-center">
                    <label class="form-label m-0">Váhy minulých rozptylů (last variances)</label>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-sm btn-outline-primary" id="addLastVariance">Přidat
                            rozptyl
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-danger" id="removeLastVariance">Odebrat
                        </button>
                    </div>
                </div>
                <div id="lastVarianceList" class="row-gap mt-2">
                    <!-- výchozí 1 řádek -->
                    <div class="row-item">
                        <input type="number" step="0.0001" name="last_variance[]" class="form-control" required>
                    </div>
                </div>
            </div>

            <!-- Dynamické: Last shocks -->
            <div class="mt-3">
                <div class="d-flex justify-content-between align-items-center">
                    <label class="form-label m-0">Váhy minulých šoků (last shocks)</label>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-sm btn-outline-primary" id="addLastShock">Přidat šok
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-danger" id="removeLastShock">Odebrat
                        </button>
                    </div>
                </div>
                <div id="lastShockList" class="row-gap mt-2">
                    <!-- výchozí 1 řádek -->
                    <div class="row-item">
                        <input type="number" step="0.0001" name="last_shock[]" class="form-control" required>
                    </div>
                </div>
            </div>

            <label for="timeSeriesIdManual" class="form-label">Vyber časovou řadu</label>
            <select id="timeSeriesIdManual" name="timeSeriesId" class="form-select">
                <option value="" selected disabled>— vyber —</option>
                <option th:each="timeSeries : ${timeSeriesList}" th:value="${timeSeries.id}"
                        th:text="${timeSeries.name + ' (id ' + timeSeries.id + ')'}">timeSeries
                </option>
            </select>

            <label for="time_series_file" class="form-label">Soubor s časovou řadou (XLSX):</label>
            <input type="file" id="time_series_file" name="time_series_file" accept=".xlsx,.xls"/>

            <button type="submit" class="btn btn-primary w-100">Spustit výpočet</button>
        </form>

        <form class="form-config" th:action="@{/start-calculation-configuration}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="mode" value="config"/>

            <label for="configurationId" class="form-label">Vyber konfiguraci</label>
            <select id="configurationId" name="configurationId" required class="form-select">
                <option value="" selected disabled>— vyber —</option>
                <option th:each="configuration : ${configurationList}" th:value="${configuration.id}"
                        th:text="${configuration.name + ' (id ' + configuration.id + ')'}">Konfigurace
                </option>
            </select>

            <label for="timeSeriesId" class="form-label">Vyber časovou řadu</label>
            <select id="timeSeriesId" name="timeSeriesId" class="form-select">
                <option value="" selected disabled>— vyber —</option>
                <option th:each="timeSeries : ${timeSeriesList}" th:value="${timeSeries.id}"
                        th:text="${timeSeries.name + ' (id ' + timeSeries.id + ')'}">timeSeries
                </option>
            </select>

            <!-- Sem se načtou modely jako radio inputy -->
            <div id="modelList" class="mt-3"></div>

            <label for="time_series_file_config" class="form-label">Soubor s časovou řadou (XLSX):</label>
            <input type="file" id="time_series_file_config" name="time_series_file" accept=".xlsx,.xls"/>

            <button type="submit" class="btn btn-secondary w-100 mt-3">Spustit výpočet (konfigurace)</button>
        </form>

        <div class="container mt-4 d-none" id="resultSection">
            <h4>Výsledek</h4>
            <canvas id="resultChart" height="120"></canvas>
        </div>
    </div>
</div>

<div th:replace="~{fragments/error-modal :: errorModal}"></div>

<template id="tpl-last-variance">
    <div class="row-item">
        <input type="number" step="0.0001" name="last_variance[]" class="form-control" required>
    </div>
</template>

<template id="tpl-last-shock">
    <div class="row-item">
        <input type="number" step="0.0001" name="last_shock[]" class="form-control" required>
    </div>
</template>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/error-modal.js"></script>

<script src="/js/dynamic-input.js"></script>

<script src="/js/configuration-models.js"></script>

<script src="/js/time-series-chart.js"></script>

</body>
</html>
