<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/navbar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div>
    <form th:action="@{/start-calculation}" method="post" enctype="multipart/form-data">
        <label for="start_variance" class="form-label">Počáteční rozptyl:</label>
        <input type="number" step="0.001" id="start_variance" name="start_variance" required/>

        <label for="constant_variance" class="form-label">Konstantní rozptyl:</label>
        <input type="number" step="0.001" id="constant_variance" name="constant_variance" required/>

        <label for="last_variance" class="form-label">Váha minulého rozptylu:</label>
        <input type="number" step="0.001" id="last_variance" name="last_variance" required/>

        <label for="last_shock" class="form-label">Váha minulého odhadu:</label>
        <input type="number" step="0.001" id="last_shock" name="last_shock" required/>

        <label for="time_series_file" class="form-label">Soubor s časovou řadou (XLSX):</label>
        <input type="file" id="time_series_file" name="time_series_file" accept=".xlsx,.xls"/>

        <button type="submit" class="btn btn-primary w-100">Spustit výpočet</button>
    </form>
</div>

<div th:replace="~{fragments/errorModal :: errorModal}"></div>

<!-- Bootstrap JS (bundle obsahuje i Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Auto-zobrazení modalu + refresh po zavření (pouze pokud existuje errorMessage) -->
<script th:if="${errorMessage}">
    (function () {
        var modalEl = document.getElementById('errorModal');
        if (!modalEl) return;
        var modal = new bootstrap.Modal(modalEl);
        modal.show();

    })();
</script>
</body>
</html>
