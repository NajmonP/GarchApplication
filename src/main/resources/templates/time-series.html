<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Time series</title>
    <link rel="stylesheet" href="/navbar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body
        data-page="time-series"
        th:attr="
        data-authenticated=${#authorization.expression('isAuthenticated()')},
        data-admin=${#authorization.expression('hasRole(''ADMIN'')')}
    ">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>Time series</h1>


<form id="csrfForm" style="display:none;">
    <input type="hidden" id="csrfToken" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <input type="hidden" id="csrfHeaderName" th:value="${_csrf.headerName}" />
</form>

<div class="container mb-3">
    <div class="row align-items-center">
        <div class="col-6">
            <input type="text"
                   id="searchInput"
                   class="form-control"
                   placeholder="Vyhledat podle názvu...">
        </div>

        <div class="col-6 text-end">
            <a href="/time-series/download/sample" class="btn btn-outline-success btn-sm">
                Stáhnout ukázkovou časovou řadu
            </a>
        </div>
    </div>
</div>

<div class="container" th:if="${#authorization.expression('isAuthenticated()')}">
    <h3>Moje časové řady</h3>
    <div id="timeSeriesCards" class="row g-3"></div>
</div>

<form id="uploadForm"
      th:action="@{/time-series/add-time-series}"
      method="post" enctype="multipart/form-data" class="container mt-4"
      th:if="${#authorization.expression('isAuthenticated()')}">
    <label for="time-series" class="form-label">Kofigurační soubor (XLSX):</label>
    <input type="file" id="time-series" name="time-series" accept=".xlsx,.xls" required/>
    <button type="submit" class="btn btn-primary w-100">Vložit</button>
</form>

<div class="container mt-5">
    <h3 th:text="${#authorization.expression('hasRole(''ADMIN'')')}
        ? 'Všechny časové řady'
        : 'Veřejné časové řady'">
        Veřejné časové řady
    </h3>
    <div id="secondaryTimeSeriesCards" class="row g-3"></div>
    <nav class="mt-3">
        <ul class="pagination justify-content-center" id="pagination"></ul>
    </nav>
</div>

<div th:replace="~{fragments/time-series-edit-modal :: editTimeSeriesModal}"></div>
<div th:replace="~{fragments/error-modal :: errorModal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/app/errorModal.js"></script>
<script src="/js/app/http.js"></script>
<script src="/js/app/search.js"></script>
<script src="/js/app/initButtons.js"></script>
<script src="/js/app/createElements.js"></script>
<script src="/js/app/format.js"></script>
<script src="/js/app/pagination.js"></script>

<script src="/js/pages/time-series.js"></script>

</body>
</html>
