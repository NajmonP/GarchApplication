<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/navbar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>Configuration</h1>

<form id="csrfForm" style="display:none;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
    <input type="hidden" id="csrfHeaderName" th:value="${_csrf.headerName}" />
</form>


<div class="row">
    <div class="card shadow-sm col-6 mb-3" th:each="configuration : ${configurationList}">
        <div class="card-body">
            <p><strong>Id:</strong> <span th:text="${configuration.id}"></span></p>
            <p><strong>Název:</strong> <span th:text="${configuration.name}"></span></p>
            <p><strong>Vytvořeno:</strong> <span th:text="${configuration.created}"></span></p>
        </div>

        <div class="card-footer d-flex justify-content-between align-items-center">
            <button type="button"
                    class="btn btn-outline-primary btn-sm show-models-btn"
                    th:attr="data-configuration-id=${configuration.id}">
                Zobraz modely
            </button>

            <div class="d-flex gap-2">
                <button type="button"
                        class="btn btn-outline-secondary btn-sm edit-config-btn"
                        data-bs-toggle="modal"
                        data-bs-target="#configurationEditModal"
                        th:attr="data-configuration-id=${configuration.id}, data-configuration-name=${configuration.name}">
                    Upravit
                </button>

                <button type="button"
                        class="btn btn-outline-danger btn-sm delete-config-btn"
                        th:attr="data-configuration-id=${configuration.id}">
                    Smazat
                </button>
            </div>
        </div>

        <div class="px-3 pb-3">
            <div class="models-container d-none"></div>
        </div>
    </div>
</div>

<form th:action="@{configuration/add-configuration}" method="post" enctype="multipart/form-data">
    <label for="configuration" class="form-label">Kofigurační soubor (XLSX):</label>
    <input type="file" id="configuration" name="configuration" accept=".xlsx,.xls" required/>

    <button type="submit" class="btn btn-primary w-100">Vložit</button>
</form>

<template id="tpl-model-item">
    <li class="list-group-item">
        <div class="d-flex justify-content-between align-items-start">
            <div class="w-100">
                <div class="fw-semibold">
                    <span class="js-model-name"></span>
                    <span class="text-muted"> (ID: <span class="js-model-id"></span>)</span>
                </div>

                <div class="text-muted small mt-1">
                    Počáteční rozptyl: <span class="js-start-variance"></span>
                    • Konstantní rozptyl: <span class="js-constant-variance"></span>
                </div>

                <div class="text-muted small mt-1">
                    Váhy minulých rozptylů: [<span class="js-last-variances"></span>]
                </div>

                <div class="text-muted small">
                    Váhy minulých šoků: [<span class="js-last-shocks"></span>]
                </div>
            </div>

            <div class="d-flex flex-column gap-2">
                <button type="button"
                        class="btn btn-outline-secondary btn-sm js-edit-model-btn"
                        data-bs-toggle="modal"
                        data-bs-target="#garchModelEditModal">
                    Upravit
                </button>

                <button type="button"
                        class="btn btn-outline-danger btn-sm js-delete-model-btn">
                    Smazat
                </button>
            </div>
        </div>
    </li>
</template>

<div th:replace="~{fragments/configuration-edit-modal :: configurationEditModal}"></div>

<div th:replace="~{fragments/garch-model-edit-modal :: garchModelEditModal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/configuration-models.js"></script>

<script src="/js/configuration-edit.js"></script>

</body>
</html>
