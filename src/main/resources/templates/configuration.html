<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Configuration</title>
    <link rel="stylesheet" href="/navbar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body
        data-page="configuration"
        th:attr="data-authenticated=${#authorization.expression('isAuthenticated()')}">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>Configuration</h1>

<form id="csrfForm" style="display:none;">
    <input type="hidden" id="csrfToken" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" id="csrfHeaderName" th:value="${_csrf.headerName}"/>
</form>

<div class="container mb-3">
    <div class="row align-items-center">
        <div class="col-6">
            <input type="text"
                   id="searchInput"
                   class="form-control"
                   placeholder="Vyhledat konfiguraci podle názvu...">
        </div>

        <div class="col-6 text-end">
            <a href="/configuration/download/sample"
               class="btn btn-outline-success btn-sm">
                Stáhnout ukázkovou konfiguraci
            </a>
        </div>
    </div>
</div>

<div class="container">
    <div id="configurationCards" class="row g-3"></div>
    <div id="pagination" class="mt-3"></div>
</div>

<form id="uploadForm"
      th:action="@{/configuration/add-configuration}"
      method="post"
      enctype="multipart/form-data"
      class="container mt-4">
    <label for="configuration" class="form-label">Kofigurační soubor (XLSX):</label>
    <input type="file" id="configuration" name="configuration" accept=".xlsx,.xls" required/>
    <button type="submit" class="btn btn-primary w-100">Vložit</button>
</form>

<template id="tpl-model-item">
    <li class="list-group-item">
        <div class="d-flex justify-content-between align-items-start">
            <div class="w-100">
                <div class="fw-semibold">
                    <span class="js-model-name"></span>
                    <span class="text-muted"> (ID: <span class="js-model-id"></span>)</span>
                </div>

                <div class="text-muted small mt-1">
                    Počáteční rozptyl: <span class="js-start-variance"></span>
                    • Konstantní rozptyl: <span class="js-constant-variance"></span>
                </div>

                <div class="text-muted small mt-1">
                    Váhy minulých rozptylů: [<span class="js-last-variances"></span>]
                </div>

                <div class="text-muted small">
                    Váhy minulých šoků: [<span class="js-last-shocks"></span>]
                </div>
            </div>

            <div class="d-flex flex-column gap-2">
                <button type="button"
                        class="btn btn-outline-secondary btn-sm js-edit-model-btn"
                        data-bs-toggle="modal"
                        data-bs-target="#garchModelEditModal">
                    Upravit
                </button>

                <button type="button"
                        class="btn btn-outline-danger btn-sm js-delete-model-btn">
                    Smazat
                </button>
            </div>
        </div>
    </li>
</template>

<div th:replace="~{fragments/configuration-edit-modal :: editConfigurationModal}"></div>
<div th:replace="~{fragments/garch-model-edit-modal :: garchModelEditModal}"></div>
<div th:replace="~{fragments/error-modal :: errorModal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/app/errorModal.js"></script>
<script src="/js/app/http.js"></script>
<script src="/js/app/search.js"></script>
<script src="/js/app/initButtons.js"></script>
<script src="/js/app/createElements.js"></script>
<script src="/js/app/format.js"></script>

<script src="/js/pages/configuration.js"></script>

</body>
</html>
