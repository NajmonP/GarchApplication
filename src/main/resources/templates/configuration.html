<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/navbar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>Configuration</h1>
<form th:action="@{configuration/add-configuration}" method="post" enctype="multipart/form-data">
    <label for="configuration" class="form-label">Kofigurační soubor (XLSX):</label>
    <input type="file" id="configuration" name="configuration" accept=".xlsx,.xls" required/>

    <button type="submit" class="btn btn-primary w-100">Vložit</button>
</form>
</body>
</html>
