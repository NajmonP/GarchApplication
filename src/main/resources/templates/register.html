<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="/navbar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div style="width: 420px;">
        <h2 class="mb-4 text-center">Registrace</h2>

        <form th:action="@{/register}" th:object="${form}" method="post" class="p-4 border rounded bg-light">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="mb-3">
                <label class="form-label">Uživatelské jméno:</label>
                <input class="form-control" th:field="*{username}">
                <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email:</label>
                <input class="form-control" th:field="*{email}">
                <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Heslo:</label>
                <input type="password" class="form-control" th:field="*{password}">
                <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="mb-3">
                <label class="form-label">Heslo znovu:</label>
                <input type="password" class="form-control" th:field="*{confirmPassword}">
                <div class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>

            <button class="btn btn-primary w-100" type="submit">Vytvořit účet</button>

            <div class="text-center mt-2">
                <a th:href="@{/login}" class="btn btn-outline-secondary btn-sm">
                    Už mám účet
                </a>
            </div>
        </form>
    </div>

</div>

<div th:replace="~{fragments/error-modal :: errorModal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/app/errorModal.js"></script>

<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function () {
        const modalError = /*[[${modalError}]]*/ null;
        if (modalError) {
            AppModal.showError(modalError);
        }
    });
</script>

</body>
</html>
