<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="cs">
<head>
    <link rel="stylesheet" href="/navbar.css">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">

    <div style="width: 400px;">
        <h2 class="mb-4 text-center">Přihlášení</h2>

        <form th:action="@{/login}" method="post" class="p-4 border rounded bg-light">
            <div class="mb-3">
                <label for="username" class="form-label">Uživatelské jméno:</label>
                <input type="text" id="username" name="username" required class="form-control"/>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Heslo:</label>
                <input type="password" id="password" name="password" required class="form-control"/>
            </div>

            <button type="submit" class="btn btn-primary w-100">Přihlásit</button>

            <div class="text-center">
                <a th:href="@{/register}" class="btn btn-outline-secondary btn-sm mt-2">
                    Zaregistrovat se
                </a>
            </div>
        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
