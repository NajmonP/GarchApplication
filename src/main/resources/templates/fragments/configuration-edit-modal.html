<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="configurationEditModal">
    <div class="modal fade" id="configurationEditModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <!-- POZOR: žádný POST submit. Form tu je jen kvůli bootstrap layoutu. -->
            <form class="modal-content" onsubmit="return false;">

                <div class="modal-header">
                    <h5 class="modal-title">Upravit konfiguraci</h5>
                    <button type="button" class="btn-close"
                            data-bs-dismiss="modal"
                            aria-label="Zavřít"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="editConfigId">

                    <label for="editConfigName" class="form-label">Název</label>
                    <input type="text"
                           class="form-control"
                           id="editConfigName"
                           required>

                    <div class="alert alert-danger d-none mt-3" id="editConfigError" role="alert"></div>
                    <div class="alert alert-success d-none mt-3" id="editConfigSuccess" role="alert">Uloženo.</div>
                </div>

                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-outline-secondary"
                            data-bs-dismiss="modal">
                        Zrušit
                    </button>

                    <button type="button"
                            class="btn btn-primary"
                            id="btnSaveConfigChanges">
                        Uložit
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
