<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <link rel="stylesheet" href="/navbar.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body
        data-page="profile"
        th:attr="data-authenticated=${#authorization.expression('isAuthenticated()')}">

<form id="csrfForm" style="display:none;">
  <input type="hidden" id="csrfToken" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
  <input type="hidden" id="csrfHeaderName" th:value="${_csrf.headerName}"/>
</form>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1 class="text-center">Profil</h1>
<hr>

<div class="container mt-4" th:if="${#authorization.expression('isAuthenticated()')}">
  <p>Na této stránce můžeš upravit své údaje nebo smazat svůj účet.</p>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h3 class="card-title mb-3">Údaje uživatele</h3>

      <form id="profileEditForm">
        <div class="mb-3">
          <label for="username" class="form-label">Uživatelské jméno</label>
          <input type="text" id="username" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="profileId" class="form-label">ID</label>
          <input type="text" id="profileId" class="form-control" disabled>
        </div>

        <div class="mb-3">
          <label for="role" class="form-label">Role</label>
          <input type="text" id="role" class="form-control" disabled>
        </div>
        <button type="submit" class="btn btn-primary">Uložit změny</button>
      </form>
    </div>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h3 class="card-title mb-3">Změna hesla</h3>

      <form id="changePasswordForm">
        <div class="mb-3">
          <label for="currentPassword" class="form-label">Aktuální heslo</label>
          <input type="password"
                 id="currentPassword"
                 name="currentPassword"
                 class="form-control"
                 required>
        </div>

        <div class="mb-3">
          <label for="newPassword" class="form-label">Nové heslo</label>
          <input type="password"
                 id="newPassword"
                 name="newPassword"
                 class="form-control"
                 required>
        </div>

        <div class="mb-3">
          <label for="confirmNewPassword" class="form-label">Potvrzení nového hesla</label>
          <input type="password"
                 id="confirmNewPassword"
                 name="confirmNewPassword"
                 class="form-control"
                 required>
        </div>

        <button type="submit" class="btn btn-primary">Změnit heslo</button>
      </form>
    </div>
  </div>

  <div class="card border-danger shadow-sm">
    <div class="card-body">
      <h3 class="card-title text-danger mb-3">Smazání účtu</h3>
      <p class="mb-3">
        Tato akce je nevratná. Účet bude trvale odstraněn z databáze.
      </p>

      <button type="button"
              id="deleteProfileBtn"
              class="btn btn-danger"
              data-delete-url="/api/profile"
              data-delete-confirm="Opravdu chceš trvale smazat svůj účet?">
        Smazat účet
      </button>
    </div>
  </div>
</div>

<div th:replace="~{fragments/error-modal :: errorModal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/app/errorModal.js"></script>
<script src="/js/app/http.js"></script>
<script src="/js/pages/profile.js"></script>
</body>
</html>
