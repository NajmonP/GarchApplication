<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Calculation</title>
    <link rel="stylesheet" href="/navbar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body
        data-page="calculation"
        th:attr="data-authenticated=${#authorization.expression('isAuthenticated()')}">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<h1>Calculation</h1>

<form id="csrfForm" style="display:none;">
    <input type="hidden" id="csrfToken" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" id="csrfHeaderName" th:value="${_csrf.headerName}"/>
</form>

<div class="container mb-3">
    <div class="row g-2">
        <div class="col-12 col-md-6">
            <input id="inputTsSearch" class="form-control" placeholder="Filtrovat podle vstupní časové řady…">
        </div>
        <div class="col-12 col-md-6">
            <input id="outputTsSearch" class="form-control" placeholder="Filtrovat podle výstupní časové řady…">
        </div>
    </div>
</div>

<div class="container">
    <div id="calculationCards" class="row g-3"></div>
    <div id="pagination" class="mt-3"></div>
</div>

<div th:replace="~{fragments/error-modal :: errorModal}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


<script src="/js/app/errorModal.js"></script>
<script src="/js/app/http.js"></script>
<script src="/js/app/search.js"></script>
<script src="/js/app/initButtons.js"></script>
<script src="/js/app/createAndFormatElements.js"></script>


<script src="/js/pages/calculation.js"></script>

</body>
</html>
