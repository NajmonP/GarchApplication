<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/navbar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h1>Calculation</h1>
<div class="row">
    <div class="card shadow-sm col-6 mb-3" th:each="calculation : ${calculationList}">
        <div class="card-body">
            <p><strong>Id:</strong> <span th:text="${calculation.id}"></span></p>
            <p><strong>Status:</strong> <span th:text="${calculation.status}"></span></p>
            <p><strong>Spustil:</strong> <span th:text="${calculation.user.username}"></span></p>
            <p><strong>Datum:</strong> <span th:text="${calculation.runAt}"></span></p>
            <p><strong>Vstupní časová řada:</strong><span th:text="${calculation.inputTimeSeries != null ?  calculation.inputTimeSeries.name + ' (' + calculation.inputTimeSeries.id + ')' : ' - '}"></span></p>
            <p><strong>Vstupní časová řada:</strong><span th:text="${calculation.resultTimeSeries != null ?  calculation.resultTimeSeries.name + ' (' + calculation.resultTimeSeries.id + ')' : ' - '}"></span></p>

            <div class="d-flex gap-2 mt-3">
                <a class="btn btn-outline-secondary btn-sm"
                   th:href="@{/calculation/{id}(id=${calculation.id})}">
                    Zobrazit detaily
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
