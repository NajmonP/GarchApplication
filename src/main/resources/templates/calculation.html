<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/navbar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h1>Calculation</h1>

<form id="csrfForm" style="display:none;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" id="csrfHeaderName" th:value="${_csrf.headerName}"/>
</form>

<div class="row mb-3">
    <div class="col-6">
        <input id="inputTsSearch" class="form-control" placeholder="Filtrovat podle vstupní časové řady…">
    </div>
    <div class="col-6">
        <input id="outputTsSearch" class="form-control" placeholder="Filtrovat podle výstupní časové řady…">
    </div>
</div>

<div class="row">
    <div class="card shadow-sm col-6 mb-3 calculation-card" th:each="calculation : ${calculationList}" th:attr="data-input=${calculation.inputTimeSeries != null ? calculation.inputTimeSeries.name : ''},
              data-output=${calculation.resultTimeSeries != null ? calculation.resultTimeSeries.name : ''}">
        <div class="card-body">
            <p><strong>Id:</strong> <span th:text="${calculation.id}"></span></p>
            <p><strong>Status:</strong> <span th:text="${calculation.status}"></span></p>
            <p><strong>Spustil:</strong> <span th:text="${calculation.user.username}"></span></p>
            <p><strong>Datum:</strong> <span th:text="${calculation.runAt}"></span></p>
            <p><strong>Vstupní časová řada:</strong><span
                    th:text="${calculation.inputTimeSeries != null ?  calculation.inputTimeSeries.name + ' (' + calculation.inputTimeSeries.id + ')' : ' - '}"></span>
            </p>
            <p><strong>Výstupní časová řada:</strong><span
                    th:text="${calculation.resultTimeSeries != null ?  calculation.resultTimeSeries.name + ' (' + calculation.resultTimeSeries.id + ')' : ' - '}"></span>
            </p>

            <div class="d-flex justify-content-between align-items-center mt-3">
                <a class="btn btn-outline-secondary btn-sm"
                   th:href="@{/calculation/{id}(id=${calculation.id})}">
                    Zobrazit detaily
                </a>

                <button type="button"
                        class="btn btn-outline-danger btn-sm js-delete-calculation"
                        th:attr="data-id=${calculation.id}">
                    Smazat
                </button>
            </div>

        </div>
    </div>
</div>

<script src="/js/calculation-delete.js"></script>

<script src="/js/search.js"></script>

</body>
</html>
