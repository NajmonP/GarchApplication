<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="/navbar.css">
    <link rel="stylesheet" href="/index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<h1>Log</h1>

<div class="container my-4">
    <div class="d-flex flex-wrap gap-2 align-items-end mb-3">
        <div>
            <label class="form-label mb-1" for="fromDate">Od</label>
            <input id="fromDate" type="date" class="form-control">
        </div>

        <div>
            <label class="form-label mb-1" for="toDate">Do</label>
            <input id="toDate" type="date" class="form-control">
        </div>

        <button id="filterBtn" class="btn btn-primary">Filtrovat</button>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
            <thead class="table-light">
            <tr>
                <th>userId</th>
                <th>username</th>
                <th>Operace</th>
                <th>EntityType</th>
                <th>EntityId</th>
                <th>EntityName</th>
                <th>Čas</th>
            </tr>
            </thead>
            <tbody id="auditTbody">
            <tr>
                <td colspan="7" class="text-muted">Zatím žádná data…</td>
            </tr>
            </tbody>
        </table>
    </div>
    <nav class="mt-3">
        <ul class="pagination justify-content-center" id="pagination"></ul>
    </nav>
</div>

<script src="/js/log.js"></script>

</body>
</html>
